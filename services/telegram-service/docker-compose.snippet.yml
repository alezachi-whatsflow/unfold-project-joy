# ══════════════════════════════════════════════════════════════════
# Add this service block to your existing docker-compose.yml
# on the VPS (89.117.25.85), inside the `services:` section.
# Make sure it joins the same network as supabase-kong.
# ══════════════════════════════════════════════════════════════════

  telegram-service:
    build:
      context: ./services/telegram-service
      dockerfile: Dockerfile
    container_name: whatsflow-telegram-service
    restart: unless-stopped
    environment:
      PORT: "3100"
      INTERNAL_API_KEY: "${TELEGRAM_SERVICE_API_KEY}"
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      SUPABASE_URL: "http://supabase-kong:8000"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      TELEGRAM_WEBHOOK_URL: "http://supabase-kong:8000/functions/v1/telegram-webhook"
      TELEGRAM_WEBHOOK_SECRET: "${TELEGRAM_WEBHOOK_SECRET}"
    networks:
      - supabase_default
    # Not exposed publicly — only reachable within Docker network
    # The Edge Function proxy is the public bridge
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

# ── Required .env vars on the VPS ──
# TELEGRAM_SERVICE_API_KEY=<generate a strong random key>
# TELEGRAM_API_ID=<from https://my.telegram.org>
# TELEGRAM_API_HASH=<from https://my.telegram.org>
# TELEGRAM_WEBHOOK_SECRET=<same as TELEGRAM_WEBHOOK_SECRET in supabase edge functions>

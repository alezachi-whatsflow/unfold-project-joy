version: '3.8'

services:
  bullmq-worker:
    build: .
    container_name: whatsflow-bullmq-worker
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - whatsflow-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  whatsflow-net:
    driver: bridge

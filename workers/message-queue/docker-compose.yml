# ═══════════════════════════════════════════
# Whatsflow Message Queue Worker
# Runs alongside the Redis containers
# ═══════════════════════════════════════════

# ═══════════════════════════════════════════
# Whatsflow Message Queue Worker
# Connects to Redis via DNS (filasXXX.whatsflow.com.br)
# All config via .env — nenhum valor hardcoded
# ═══════════════════════════════════════════

services:
  wf-queue-worker:
    build: .
    restart: unless-stopped
    container_name: wf-queue-worker
    env_file: .env
    environment:
      - NODE_ENV=production

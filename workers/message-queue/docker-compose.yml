# ══════════════════════════════════════════════════════════════
# WHATSFLOW — FILAS REDIS (Servidor Dedicado)
#
# Deploy: copiar para o servidor e executar
#   scp docker-compose.yml root@[2804:8fbc:0:5::a152]:/opt/whatsflow-redis/
#   ssh root@[2804:8fbc:0:5::a152]
#   cd /opt/whatsflow-redis && docker compose up -d
#
# Arquitetura (3 filas isoladas):
#   Core     :16379 → Mensagens 1:1, chatbot, webhooks, DLQ
#   Schedule :16380 → Agendamentos, follow-ups, lembretes
#   Campaign :16381 → Envio em massa (10k+ destinatários)
#
# Acesso externo: Supabase Edge Functions + Workers (futuros)
# ══════════════════════════════════════════════════════════════

services:

  redis-core:
    image: redis:7.4-alpine
    container_name: wf-redis-core
    restart: always
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --requirepass "rD9!vQ2#xL7@pN4$$zT8&kM6^yF3*"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --timeout 0
    ports:
      - "16379:6379"
    volumes:
      - core-data:/data
    networks:
      - wf-redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "rD9!vQ2#xL7@pN4$$zT8&kM6^yF3*", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-schedule:
    image: redis:7.4-alpine
    container_name: wf-redis-schedule
    restart: always
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --requirepass "rD9!vQ2#xL7@pN4$$zT8&kM6^yF3*"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 500
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --timeout 0
    ports:
      - "16380:6379"
    volumes:
      - schedule-data:/data
    networks:
      - wf-redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "rD9!vQ2#xL7@pN4$$zT8&kM6^yF3*", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-campaign:
    image: redis:7.4-alpine
    container_name: wf-redis-campaign
    restart: always
    command: >
      redis-server
      --bind 0.0.0.0
      --port 6379
      --requirepass "rD9!vQ2#xL7@pN4$$zT8&kM6^yF3*"
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 300 1000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --timeout 0
    ports:
      - "16381:6379"
    volumes:
      - campaign-data:/data
    networks:
      - wf-redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "rD9!vQ2#xL7@pN4$$zT8&kM6^yF3*", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:2.64
    container_name: wf-redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - insight-data:/data
    networks:
      - wf-redis
    depends_on:
      redis-core:
        condition: service_healthy
      redis-schedule:
        condition: service_healthy
      redis-campaign:
        condition: service_healthy

volumes:
  core-data:
    name: wf-redis-core-data
  schedule-data:
    name: wf-redis-schedule-data
  campaign-data:
    name: wf-redis-campaign-data
  insight-data:
    name: wf-redis-insight-data

networks:
  wf-redis:
    name: wf-redis-net
